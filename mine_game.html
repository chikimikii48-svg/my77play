<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.supabase.co https://jsdelivr.net https://supabase.co; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Bomb Mine</title>
    <script src="https://jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0b13; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-container { width: 100%; max-width: 420px; background: #161626; padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; width: 100%; }
        .back-btn { background: none; border: none; color: #00ffcc; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        .header h1 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .top-status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .g-id { font-size: 0.9rem; color: #00ffcc; font-family: monospace; font-weight: 700; }
        .g-bal { font-size: 1rem; color: #00ffcc; font-weight: 800; }
        .mines-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }
        .mine-box { background: linear-gradient(135deg, #1f1f3a 0%, #2c2c54 100%); border: 2px solid #333; height: 120px; border-radius: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 3rem; transition: all 0.3s ease; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .mine-box.revealed { background: #0f0f1d; border-color: #444; cursor: not-allowed; }
        .mine-box.disabled { cursor: not-allowed; pointer-events: none; }
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; text-align: left; margin-bottom: 15px; }
        .label-text { font-size: 0.85rem; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .amt-chip { background: #1f1f3a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; text-align: center; font-size: 0.85rem; }
        .amt-chip.active { background: #00ffcc; color: #0b0b13; border-color: #00ffcc; }
        .custom-amt-box { width: 100%; background: #1f1f3a; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: bold; outline: none; }
        .action-btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; text-transform: uppercase; color: #fff; }
        .btn-start { background: linear-gradient(135deg, #00ffcc 0%, #00ccaa 100%); color: #0b0b13; }
        .btn-cashout { background: linear-gradient(135deg, #ffaa00 0%, #ff8800 100%); color: #fff; display: none; }
        .btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; box-shadow: none !important; }
        .msg-box { padding: 12px; border-radius: 8px; font-size: 0.95rem; display: none; margin-bottom: 15px; text-align: left; }
        .msg-error { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); }
        .msg-success { color: #25D366; background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header"><button class="back-btn" onclick="goBack()">←</button><h1>Bomb Mine</h1></div>
        <div class="top-status-bar"><div class="g-id" id="display-id">ID: --------</div><div class="g-bal" id="display-balance">₹0.00</div></div>
        <div id="status-msg" class="msg-box"></div>
        <div class="mines-grid">
            <div class="mine-box disabled" id="box-0" onclick="clickBox(0)"></div>
            <div class="mine-box disabled" id="box-1" onclick="clickBox(1)"></div>
            <div class="mine-box disabled" id="box-2" onclick="clickBox(2)"></div>
            <div class="mine-box disabled" id="box-3" onclick="clickBox(3)"></div>
        </div>
        <div class="control-section">
            <div class="label-text">Select Bet Amount (₹)</div>
            <div class="amount-grid">
                <button class="amt-chip active" onclick="setBetAmount(10, this)">10</button>
                <button class="amt-chip" onclick="setBetAmount(100, this)">100</button>
                <button class="amt-chip" onclick="setBetAmount(1000, this)">1K</button>
                <button class="amt-chip" onclick="setBetAmount(5000, this)">5K</button>
            </div>
            <input type="number" id="custom-amount" class="custom-amt-box" placeholder="Or enter custom amount" oninput="customAmountChanged()">
            <div class="action-btn-row">
                <button class="btn btn-start" id="start-btn" onclick="startGame()">Start Game</button>
                <button class="btn btn-cashout" id="cashout-btn" onclick="cashOut()">Cash Out</button>
            </div>
        </div>
    </div>
    <script>
        const activeUser = localStorage.getItem('my77play_user');
        if (!activeUser) { window.location.href = 'index.html'; }
        let savedId = localStorage.getItem('my77play_id');
        if (savedId) { document.getElementById('display-id').innerText = "ID: " + savedId; }
        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1w2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        const statusMsg = document.getElementById('status-msg');
        let userCurrentBalance = 0; let selectedAmount = 10; let gameActive = false;
        let diamondsFound = 0; let bombIndex = -1; let revealedBoxes = [];
        async function fetchUserBalance() {
            try {
                const { data } = await supabaseClient.from('user').select('balance').eq('mobile', activeUser).maybeSingle();
                if (data) { userCurrentBalance = parseFloat(data.balance || 0); document.getElementById('display-balance').innerText = '₹' + userCurrentBalance.toFixed(2); }
            } catch (err) {}
        }
        fetchUserBalance();
        function showMsg(text, isSuccess) { statusMsg.innerText = text; statusMsg.style.display = 'block'; statusMsg.className = "msg-box " + (isSuccess ? "msg-success" : "msg-error"); }
        function setBetAmount(val, btn) { if (gameActive) return; selectedAmount = val; document.getElementById('custom-amount').value = ""; document.querySelectorAll('.amt-chip').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function customAmountChanged() { if (gameActive) return; const inputVal = parseFloat(document.getElementById('custom-amount').value); if (!isNaN(inputVal) && inputVal > 0) { selectedAmount = inputVal; document.querySelectorAll('.amt-chip').forEach(b => b.classList.remove('active')); } }
        function goBack() { window.location.href = 'home.html'; }
        async function startGame() {
            statusMsg.style.display = 'none';
            if (isNaN(selectedAmount) || selectedAmount < 10) { showMsg("Minimum bet amount is ₹10!", false); return; }
            if (selectedAmount > userCurrentBalance) { showMsg("Insufficient Balance!", false); return; }
            document.getElementById('start-btn').disabled = true;
            try {
                const { error } = await supabaseClient.from('mine_bets').insert([{ mobile: activeUser, bet_amount: selectedAmount, status: 'Pending' }]);
                if (error) { showMsg("Failed, try again.", false); document.getElementById('start-btn').disabled = false; return; }
                const newBal = userCurrentBalance - selectedAmount;
                await supabaseClient.from('user').update({ balance: newBal }).eq('mobile', activeUser);
                userCurrentBalance = newBal; document.getElementById('display-balance').innerText = '₹' + userCurrentBalance.toFixed(2);
                gameActive = true; diamondsFound = 0; revealedBoxes = []; bombIndex = Math.floor(Math.random() * 4);
                for(let i=0; i<4; i++) { const box = document.getElementById(`box-${i}`); box.innerText = ""; box.className = "mine-box"; }
                document.getElementById('custom-amount').disabled = true;
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('cashout-btn').style.display = 'block'; document.getElementById('cashout-btn').disabled = true;
            } catch(err) { document.getElementById('start-btn').disabled = false; }
        }
        async function clickBox(index) {
            if (!gameActive || revealedBoxes.includes(index)) return;
            revealedBoxes.push(index);
            const box = document.getElementById(`box-${index}`); box.classList.add('revealed');
            
            // 🧠 कसीनो मास्टर लॉजिक (40-60 और वॉलेट ट्रैप)
            let forceLoss = false; let forceWin = false; let luckChance = Math.random() < 0.10;
            if (userCurrentBalance >= 2000 && Math.random() < 0.80) forceLoss = true;
