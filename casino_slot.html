<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.supabase.co https://jsdelivr.net https://supabase.co; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Casino Slot</title>
    <script src="https://jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0b13; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-container { width: 100%; max-width: 420px; background: #161626; padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; width: 100%; }
        .back-btn { background: none; border: none; color: #00ffcc; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        .header h1 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }

        .top-status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .g-id { font-size: 0.9rem; color: #00ffcc; font-family: monospace; font-weight: 700; }
        .g-bal { font-size: 1rem; color: #00ffcc; font-weight: 800; }

        /* लास वेगास स्लॉट मशीन डिजाइन */
        .slot-machine { background: linear-gradient(135deg, #1f0f3d 0%, #4b0082 100%); border: 4px solid #ffd700; padding: 20px; border-radius: 20px; display: flex; justify-content: center; gap: 15px; margin: 30px 0; box-shadow: 0 0 25px rgba(218, 165, 32, 0.4); }
        .reel { width: 80px; height: 100px; background: #0f0f1d; border-radius: 10px; border: 2px solid #333; display: flex; justify-content: center; align-items: center; font-size: 3.2rem; transition: transform 0.1s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }

        /* कंट्रोल सेक्शन */
        .control-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); text-align: left; }
        .label-text { font-size: 0.85rem; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .amt-chip { background: #1f1f3a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; text-align: center; font-size: 0.85rem; }
        .amt-chip.active { background: #00ffcc; color: #0b0b13; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .custom-amt-box { width: 100%; background: #1f1f3a; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: bold; outline: none; margin-bottom: 15px; }

        .spin-btn { background: linear-gradient(135deg, #ffd700 0%, #ff8800 100%); color: #0b0b13; border: none; padding: 16px; border-radius: 12px; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; box-shadow: 0 6px 15px rgba(255, 215, 0, 0.2); }
        .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4); }
        .spin-btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; box-shadow: none !important; transform: none; }

        .msg-box { padding: 12px; border-radius: 8px; font-size: 0.95rem; display: none; margin-bottom: 15px; text-align: left; }
        .msg-error { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); }
        .msg-success { color: #25D366; background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>Casino Slot</h1>
        </div>

        <div class="top-status-bar">
            <div class="g-id" id="display-id">ID: --------</div>
            <div class="g-bal" id="display-balance">₹0.00</div>
        </div>

        <div id="status-msg" class="msg-box"></div>

        <!-- 3 रील्स वाली स्लॉट मशीन -->
        <div class="slot-machine">
            <div class="reel" id="reel-1">🍒</div>
            <div class="reel" id="reel-2">💎</div>
            <div class="reel" id="reel-3">🔔</div>
        </div>

        <!-- बेट कंट्रोल पैनल -->
        <div class="control-section">
            <div class="label-text">Select Bet Amount (₹)</div>
            <div class="amount-grid">
                <button class="amt-chip active" onclick="setBetAmount(10, this)">10</button>
                <button class="amt-chip" onclick="setBetAmount(100, this)">100</button>
                <button class="amt-chip" onclick="setBetAmount(1000, this)">1K</button>
                <button class="amt-chip" onclick="setBetAmount(5000, this)">5K</button>
            </div>
            <input type="number" id="custom-amount" class="custom-amt-box" placeholder="Or enter custom amount" oninput="customAmountChanged()">
            
            <button class="spin-btn" id="spin-btn" onclick="spinMachine()">Spin Machine</button>
        </div>
    </div>

    <script>
        const activeUser = localStorage.getItem('my77play_user');
        if (!activeUser) { window.location.href = 'index.html'; }

        let savedId = localStorage.getItem('my77play_id');
        if (savedId) { document.getElementById('display-id').innerText = "ID: " + savedId; }

        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1w2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const statusMsg = document.getElementById('status-msg');
        const items = ['🍒', '💎', '🔔', '👑', '🍀'];
        let userCurrentBalance = 0;
        let selectedAmount = 10;
        let isSpinning = false;

        async function fetchUserBalance() {
            if (!supabaseClient || !activeUser) return;
            try {
                const { data } = await supabaseClient.from('user').select('balance').eq('mobile', activeUser).maybeSingle();
                if (data) {
                    userCurrentBalance = parseFloat(data.balance || 0);
                    document.getElementById('display-balance').innerText = '₹' + userCurrentBalance.toFixed(2);
                }
            } catch (err) {}
        }
        fetchUserBalance();

        function showMsg(text, isSuccess) {
            statusMsg.innerText = text;
            statusMsg.style.display = 'block';
            statusMsg.className = "msg-box " + (isSuccess ? "msg-success" : "msg-error");
        }

        function setBetAmount(val, btn) {
            if (isSpinning) return;
            selectedAmount = val;
            document.getElementById('custom-amount').value = "";
            document.querySelectorAll('.amt-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function customAmountChanged() {
            if (isSpinning) return;
            const inputVal = parseFloat(document.getElementById('custom-amount').value);
            if (!isNaN(inputVal) && inputVal > 0) {
                selectedAmount = inputVal;
                document.querySelectorAll('.amt-chip').forEach(b => b.classList.remove('active'));
            }
        }

        function goBack() { window.location.href = 'home.html'; }

        // --- स्लॉट मशीन स्पिनिंग और न्यू निष्पक्ष जैकपॉट एल्गोरिदम ---
        async function spinMachine() {
            statusMsg.style.display = 'none';
            if (isSpinning) return;
            
            if (isNaN(selectedAmount) || selectedAmount < 10) { showMsg("Minimum bet amount is ₹10!", false); return; }
            if (selectedAmount > 100000) { showMsg("Maximum bet amount limit is ₹1,00,000!", false); return; }
            if (selectedAmount > userCurrentBalance) { showMsg("Insufficient Balance! Please Recharge.", false); return; }

            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('custom-amount').disabled = true;

            try {
                // 1. सुप्रबेस की 'slot_bets' टेबल में लाइव एंट्री करना
                const { error } = await supabaseClient.from('slot_bets').insert([
                    { mobile: activeUser, bet_amount: selectedAmount, status: 'Pending' }
                ]);

                if (error) {
                    showMsg("Machine error, try again.", false);
                    resetControls();
                    return;
                }

                // 2. वॉलेट से लाइव पैसा काटना
                const newBal = userCurrentBalance - selectedAmount;
                await supabaseClient.from('user').update({ balance: newBal }).eq('mobile', activeUser);
                userCurrentBalance = newBal;
                document.getElementById('display-balance').innerText = '₹' + userCurrentBalance.toFixed(2);

                // 3. विज़ुअल स्पिन इफ़ेक्ट (रील्स में सिम्बल्स का तेज़ी से बदलना)
                let spinInterval = setInterval(() => {
                    document.getElementById('reel-1').innerText = items[Math.floor(Math.random() * items.length)];
