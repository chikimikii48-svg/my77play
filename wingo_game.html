<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.supabase.co https://jsdelivr.net https://supabase.co; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Wingo Pro 30-Sec</title>
    <script src="https://jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0b13; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-container { width: 100%; max-width: 420px; background: #161626; padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-align: left; width: 100%; }
        .back-btn { background: none; border: none; color: #00ffcc; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        .header h1 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }

        .top-status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .g-id { font-size: 0.9rem; color: #00ffcc; font-family: monospace; font-weight: 700; }
        .g-bal { font-size: 1rem; color: #00ffcc; font-weight: 800; }

        .timer-section { background: #0f0f1d; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(0, 255, 204, 0.1); position: relative; }
        .timer-title { font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .countdown { font-size: 3.5rem; color: #00ffcc; font-weight: bold; font-family: monospace; text-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .period-text { font-size: 0.95rem; color: #aaa; margin-top: 5px; font-family: monospace; }
        
        .lock-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 77, 77, 0.15); border-radius: 16px; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 900; color: #ff4d4d; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(1px); }

        .amount-selector { display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); text-align: left; }
        .amount-label { font-size: 0.85rem; color: #888; text-transform: uppercase; }
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 5px; }
        .amt-chip { background: #1f1f3a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; text-align: center; font-size: 0.85rem; }
        .amt-chip.active { background: #00ffcc; color: #0b0b13; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        .custom-amt-box { width: 100%; background: #1f1f3a; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: bold; outline: none; }

        .bet-title { font-size: 1.1rem; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        .button-section { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 25px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; color: #fff; }
        .btn-green { background: linear-gradient(135deg, #1ebd54 0%, #25D366 100%); }
        .btn-violet { background: linear-gradient(135deg, #823ac7 0%, #9b51e0 100%); }
        .btn-red { background: linear-gradient(135deg, #e03e3e 0%, #ff4d4d 100%); }
        .btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; box-shadow: none !important; }

        /* स्टाइलिश विन हिस्ट्री सेक्शन (5 मैच हाइड/अनहाइड लॉजिक) */
        .history-section { background: #161626; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); padding: 15px; margin-top: 25px; text-align: left; width: 100%; }
        .history-title { font-size: 1rem; color: #fff; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; border-left: 3px solid #00ffcc; padding-left: 8px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: monospace; font-size: 0.9rem; }
        .history-item:last-child { border: none; }
        .badge { padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .badge-Green { background: #25D366; color: #000; }
        .badge-Red { background: #ff4d4d; color: #fff; }
        .badge-Violet { background: #9b51e0; color: #fff; }
        
        .history-toggle-btn { background: none; border: none; color: #00ffcc; font-weight: bold; cursor: pointer; display: block; margin: 15px auto 0 auto; font-size: 0.9rem; text-decoration: underline; }

        .msg-box { padding: 12px; border-radius: 8px; font-size: 0.95rem; display: none; margin-bottom: 15px; text-align: left; }
        .msg-error { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); }
        .msg-success { color: #25D366; background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>Wingo 30-Sec</h1>
        </div>

        <div class="top-status-bar">
            <div class="g-id" id="display-id">ID: --------</div>
            <div class="g-bal" id="display-balance">₹0.00</div>
        </div>

        <div id="status-msg" class="msg-box"></div>

        <div class="timer-section">
            <div class="timer-title">Wingo Countdown</div>
            <div id="countdown" class="countdown">00:30</div>
            <div id="period-id" class="period-text">Period: Loading...</div>
            <div id="lock-screen" class="lock-overlay">🔒 Locked</div>
        </div>

        <div class="amount-selector">
            <div class="amount-label">Select Bet Amount (₹)</div>
            <div class="amount-grid">
                <button class="amt-chip active" onclick="setBetAmount(10, this)">10</button>
                <button class="amt-chip" onclick="setBetAmount(100, this)">100</button>
                <button class="amt-chip" onclick="setBetAmount(1000, this)">1K</button>
                <button class="amt-chip" onclick="setBetAmount(5000, this)">5K</button>
            </div>
            <input type="number" id="custom-amount" class="custom-amt-box" placeholder="Or enter custom amount (Max 1 Lakh)" oninput="customAmountChanged()">
        </div>

        <div class="bet-title">Select Color to Bet</div>
        <div class="button-section">
            <button class="btn btn-green" id="b-green" onclick="placeBet('Green')">Green</button>
            <button class="btn btn-violet" id="b-violet" onclick="placeBet('Violet')">Violet</button>
            <button class="btn btn-red" id="b-red" onclick="placeBet('Red')">Red</button>
        </div>

        <!-- विन हिस्ट्री सेक्शन -->
        <div class="history-section">
            <div class="history-title">📈 Game Win History</div>
            <div id="history-container">
                <!-- लाइव डेटा यहाँ लोड होगा -->
            </div>
            <button class="history-toggle-btn" id="toggle-hist-btn" onclick="toggleHistoryLength()">Show More History</button>
        </div>
    </div>

    <script>
        const activeUser = localStorage.getItem('my77play_user');
        if (!activeUser) { window.location.href = 'index.html'; }

        let savedId = localStorage.getItem('my77play_id');
        if (savedId) { document.getElementById('display-id').innerText = "ID: " + savedId; }

        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1w2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const statusMsg = document.getElementById('status-msg');
        let userCurrentBalance = 0;
        let selectedAmount = 10;
        let isLocked = false;
        let currentPeriodId = "";
        let showFullHistory = false;
        let lastProcessedPeriod = "";

        async function fetchUserBalance() {
            if (!supabaseClient || !activeUser) return;
            try {
                const { data } = await supabaseClient.from('user').select('balance').eq('mobile', activeUser).maybeSingle();
                if (data) {
                    userCurrentBalance = parseFloat(data.balance || 0);
                    document.getElementById('display-balance').innerText = '₹' + userCurrentBalance.toFixed(2);
                }
            } catch (err) {}
        }
        fetchUserBalance();

        function showMsg(text, isSuccess) {
            statusMsg.innerText = text;
            statusMsg.style.display = 'block';
            statusMsg.className = "msg-box " + (isSuccess ? "msg-success" : "msg-error");
        }

        function setBetAmount(val, btn) {
            if (isLocked) return;
            selectedAmount = val;
