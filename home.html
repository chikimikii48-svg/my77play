<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Home</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f0f1a; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; padding-bottom: 80px; display: flex; flex-direction: column; align-items: center; }
        .main-container { width: 100%; max-width: 420px; padding: 20px; }
        .user-header { background: #1c1c27; padding: 15px; border-radius: 16px; border: 1px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,255,204,0.1); }
        .user-info .user-phone { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .user-info .user-id { font-size: 0.85rem; color: #00ffcc; margin-top: 3px; font-family: monospace; }
        .wallet-box { background: #2c2c3e; padding: 10px 15px; border-radius: 10px; border: 1px solid #444; text-align: right; }
        .wallet-box .bal-title { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .wallet-box .bal-amount { font-size: 1.2rem; color: #00ffcc; font-weight: bold; }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: #fff; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid #00ffcc; padding-left: 10px; }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .game-card { background: #1c1c27; border-radius: 14px; padding: 20px; border: 1px solid #2c2c3e; text-align: center; transition: 0.3s; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; }
        .game-card:hover { border-color: #00ffcc; transform: translateY(-3px); }
        .game-icon { font-size: 2.2rem; margin-bottom: 8px; }
        .game-name { font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
        .game-btn { background: #00ffcc; color: #0f0f1a; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; width: 100%; }
        #profile-section { display: none; }
        .profile-menu { display: flex; flex-direction: column; gap: 12px; }
        .menu-btn { background: #1c1c27; border: 1px solid #2c2c3e; color: #fff; padding: 15px; border-radius: 10px; text-align: left; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .menu-btn:hover { border-color: #00ffcc; background: #222235; }
        .menu-btn.logout { border-color: #ff4d4d; color: #ff4d4d; }
        .menu-btn.logout:hover { background: rgba(255,77,77,0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: #1c1c27; border-top: 1px solid #2c2c3e; display: flex; height: 65px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .nav-item.active { color: #00ffcc; }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- टॉप यूजर हेडर (यह गेम्स और प्रोफाइल दोनों टैब में ऊपर हमेशा सेम परमानेंट ID दिखाएगा) -->
        <div class="user-header">
            <div class="user-info">
                <div class="user-phone" id="user-phone">Loading...</div>
                <div class="user-id" id="user-permanent-id">ID: --------</div>
            </div>
            <div class="wallet-box">
                <div class="bal-title">Wallet Balance</div>
                <div class="bal-amount" id="main-balance">₹0.00</div>
            </div>
        </div>

        <!-- 1. GAMES SCREEN TAB -->
        <div id="games-section">
            <h2>All Games</h2>
            <div class="games-grid">
                <!-- बदलाव 2: सभी 4 गेम्स पर Play Now का बटन लगाया -->
                <div class="game-card">
                    <div><div class="game-icon">🎨</div><div class="game-name">Colour Prediction</div></div>
                    <button class="game-btn" onclick="openGamePage('Colour Prediction')">Play Now</button>
                </div>
                <div class="game-card">
                    <div><div class="game-icon">💣</div><div class="game-name">Bomb Mine</div></div>
                    <button class="game-btn" onclick="openGamePage('Bomb Mine')">Play Now</button>
                </div>
                <div class="game-card">
                    <div><div class="game-icon">🪙</div><div class="game-name">Head & Tail</div></div>
                    <button class="game-btn" onclick="openGamePage('Head & Tail')">Play Now</button>
                </div>
                <div class="game-card">
                    <div><div class="game-icon">🃏</div><div class="game-name">Casino Slot</div></div>
                    <button class="game-btn" onclick="openGamePage('Casino Slot')">Play Now</button>
                </div>
            </div>
        </div>

        <!-- 2. PROFILE SCREEN TAB -->
        <div id="profile-section">
            <h2>My Profile</h2>
            <div class="profile-menu">
                <!-- बदलाव 3 & 4: प्रोफाइल के बटन्स को सही क्रम में सेट किया -->
                <button class="menu-btn" onclick="handleAction('Recharge')">🟢 Deposit / Recharge</button>
                <button class="menu-btn" onclick="handleAction('Withdrawal')">🔴 Withdrawal Money</button>
                <button class="menu-btn" onclick="handleAction('Help')">💬 Customer Support</button>
                <button class="menu-btn logout" onclick="handleLogout()">🚪 Logout Account</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-games" onclick="switchTab('games')"><span class="nav-icon">🎮</span><span>Games</span></div>
        <div class="nav-item" id="nav-profile" onclick="switchTab('profile')"><span class="nav-icon">👤</span><span>Profile</span></div>
    </div>

    <script>
        const activeUser = localStorage.getItem('my77play_user');
        if (!activeUser) { window.location.href = 'index.html'; } else { document.getElementById('user-phone').innerText = "+91 " + activeUser; }

        // बदलाव 1: लोकलस्टोरेज बैकअप से परमानेंट ID तुरंत लोड करेगा ताकि "Loading..." गायब हो जाए
        let savedId = localStorage.getItem('my77play_id');
        if (savedId) { document.getElementById('user-permanent-id').innerText = "ID: " + savedId; }

        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1w2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadUserData() {
            if (!supabaseClient || !activeUser) return;
            try {
                const { data } = await supabaseClient.from('user').select('wallet_balance, player_id').eq('mobile', activeUser).maybeSingle();
                if (data) {
                    document.getElementById('main-balance').innerText = '₹' + parseFloat(data.wallet_balance || 0).toFixed(2);
                    if (data.player_id) {
                        document.getElementById('user-permanent-id').innerText = "ID: " + data.player_id;
                        localStorage.setItem('my77play_id', data.player_id);
                    }
                }
            } catch (err) {}
        }
        loadUserData();
        setInterval(loadUserData, 5000); 

        function switchTab(tabName) {
            const gamesSec = document.getElementById('games-section'); const profileSec = document.getElementById('profile-section');
            const navGames = document.getElementById('nav-games'); const navProfile = document.getElementById('nav-profile');
            if (tabName === 'games') {
                gamesSec.style.display = 'block'; profileSec.style.display = 'none';
                navGames.classList.add('active'); navProfile.classList.remove('active');
            } else {
                gamesSec.style.display = 'none'; profileSec.style.display = 'block';
                navGames.classList.remove('active'); navProfile.classList.add('active');
            }
        }

        function openGamePage(gameName) { alert("Opening " + gameName + " Game Screen..."); }
        
        function handleAction(type) {
            if (type === 'Recharge') { alert("Deposit / Recharge Panel Clicked!"); }
            else if (type === 'Withdrawal') { alert("Withdrawal Money Panel Clicked!"); }
            else if (type === 'Help') { window.open('https://wa.me', '_blank'); }
        }
        
        // बदलाव 5: लॉगआउट करने पर पूरा सेशन डिलीट होकर index.html पेज खुल जाएगा
        function handleLogout() { 
            localStorage.removeItem('my77play_user'); 
            localStorage.removeItem('my77play_id'); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
