<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Game Dashboard</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #0f0f1a; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-container { background: #1c1c27; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); border: 1px solid #00ffcc; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c2c3e; padding-bottom: 15px; margin-bottom: 20px; }
        .logo { font-size: 1.8rem; color: #00ffcc; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .wallet { background: #2c2c3e; padding: 8px 15px; border-radius: 8px; border: 1px solid #444; font-weight: bold; }
        .wallet span { color: #00ffcc; }
        .timer-section { background: #151522; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a3a; }
        .timer-title { font-size: 1rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .countdown { font-size: 3rem; color: #ff4d4d; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        .game-id { font-size: 0.9rem; color: #777; margin-top: 5px; }
        .button-section { display: flex; justify-content: space-between; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; color: #fff; }
        .btn-green { background: #25D366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-green:hover { background: #1ebd54; }
        .btn-violet { background: #9b51e0; box-shadow: 0 4px 15px rgba(155, 81, 224, 0.3); }
        .btn-violet:hover { background: #823ac7; }
        .btn-red { background: #ff4d4d; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }
        .btn-red:hover { background: #e03e3e; }
        .logout-btn { margin-top: 30px; background: none; border: 1px solid #555; color: #aaa; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .logout-btn:hover { border-color: #ff4d4d; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- टॉप हेडर -->
        <div class="header">
            <div class="logo">my77play</div>
            <div class="wallet">💰 Bal: <span id="balance">₹0.00</span></div>
        </div>

        <!-- लाइव काउंटडाउन टाइमर सेक्शन -->
        <div class="timer-section">
            <div class="timer-title">Wingo 1-Min Countdown</div>
            <div id="countdown" class="countdown">00:60</div>
            <div id="period-id" class="game-id">Period: Loading...</div>
        </div>

        <!-- कलर प्रेडिक्शन बटन -->
        <h3>Select Color to Bet</h3>
        <div class="button-section">
            <button class="btn btn-green" onclick="placeBet('Green')">Green</button>
            <button class="btn btn-violet" onclick="placeBet('Violet')">Violet</button>
            <button class="btn btn-red" onclick="placeBet('Red')">Red</button>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        // --- सुपर्बेस कनेक्शन ---
        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1w2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // प्लेयर वेरिफिकेशन चेक
        const activeUser = localStorage.getItem('my77play_user');
        if (!activeUser) {
            window.location.href = '/';
        }

        // --- लाइव वॉलेट बैलेंस लोड करना ---
        async function loadPlayerWallet() {
            try {
                const { data, error } = await supabaseClient
                    .from('players_profile')
                    .select('wallet_balance')
                    .eq('mobile', activeUser)
                    .maybeSingle();
                
                if (data) {
                    document.getElementById('balance').innerText = '₹' + parseFloat(data.wallet_balance).toFixed(2);
                }
            } catch (err) {
                console.log("Wallet load issue");
            }
        }
        loadPlayerWallet();

        // --- ऑटोमैटिक 1-मिनट लाइव टाइमर सिस्टम ---
        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const seconds = now.getSeconds();
                const remainingSeconds = 60 - seconds;
                
                // पीरियड आईडी जनरेट करना (तारीख + मिनट के हिसाब से)
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hour = String(now.getHours()).padStart(2, '0');
                const minute = String(now.getMinutes()).padStart(2, '0');
                const periodId = ${year}${month}${day}${hour}${minute};
                
                document.getElementById('period-id').innerText = "Period: " + periodId;

                // स्क्रीन पर टाइमर फॉर्मेट सेट करना
                const displaySeconds = remainingSeconds < 10 ? '0' + remainingSeconds : remainingSeconds;
                const timerElement = document.getElementById('countdown');
                timerElement.innerText = 00:${displaySeconds};

                // आखिरी 5 सेकंड में बटन डिसेबल (लॉक) करना
                if (remainingSeconds <= 5) {
                    timerElement.style.color = '#ff4d4d';
                    toggleButtons(true);
                } else {
                    timerElement.style.color = '#00ffcc';
                    toggleButtons(false);
                }
            }, 1000);
        }
        startTimer();

        function toggleButtons(disabled) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => btn.disabled = disabled);
        }

        // --- बेट लगाने का फंक्शन ---
        function placeBet(color) {
            alert(You selected ${color}! Placing bet...);
            // बेटिंग डेटाबेस का काम हम अगले स्टेप में जोड़ेंगे
        }

        // लॉगआउट फंक्शन
        function logout() {
            localStorage.removeItem('my77play_user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
