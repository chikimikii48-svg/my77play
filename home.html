<script>
  // 🛠️ फिक्स: आपका असली प्रोजेक्ट URL वापस सेट कर दिया गया है
  const supabaseUrl = 'https://ffejvfluwezmbrfvxmsj.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1d2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE';

  let supabaseClient = null;
  const loggedInUserMobile = localStorage.getItem('my77play_user');

  // Supabase को चालू करने का मजबूत फंक्शन
  function initSupabase() {
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
      } else {
        console.log("Supabase Library load nahi ho payi.");
      }
    } catch(e) {
      console.log("Supabase init error:", e);
    }
  }

  // पेज लोड होते ही तुरंत बिना 'Loading...' दिखाए डेटा सेट करने का लॉजिक
  window.onload = async function() {
    initSupabase();
    
    // अगर यूजर लॉगिन नहीं है, तो उसे वापस लॉगिन पेज (index.html) पर भेज दो
    if (!loggedInUserMobile) {
      window.location.href = 'index.html';
      return;
    }

    // लोकलस्टोरेज से पुरानी आईडी तुरंत निकालें
    const localPlayerId = localStorage.getItem('my77play_id');
    const localPlayerName = localStorage.getItem('my77play_name');
    
    // इंटरनेट का इंतजार किए बिना, लोकल डेटा तुरंत स्क्रीन पर दिखा दो (ताकि Loading ना दिखे)
    if (localPlayerId) {
      document.getElementById('header-player-id').innerText = "ID: " + localPlayerId;
      document.getElementById('prof-id').innerText = localPlayerId;
    } else {
      const tempId = "User_" + loggedInUserMobile.substring(6);
      document.getElementById('header-player-id').innerText = "ID: " + tempId;
      document.getElementById('prof-id').innerText = tempId;
    }
    
    if (localPlayerName) {
      document.getElementById('prof-name').innerText = localPlayerName;
      document.getElementById('prof-avatar-letter').innerText = localPlayerName.charAt(0).toUpperCase();
    } else {
      document.getElementById('prof-name').innerText = "Player";
      document.getElementById('prof-avatar-letter').innerText = "P";
    }
    
    document.getElementById('prof-mobile').innerText = loggedInUserMobile;

    // अब बैकग्राउंड में Supabase से तुरंत ताजा आईडी और बैलेंस चेक करो
    if (supabaseClient) {
      try {
        const queryMobile = isNaN(loggedInUserMobile) ? loggedInUserMobile : Number(loggedInUserMobile);

        const { data: userData, error } = await supabaseClient
          .from('users')
          .select('*')
          .eq('mobile', queryMobile)
          .maybeSingle();

        if (userData) {
          // डेटा मिलते ही स्क्रीन तुरंत ताज़ा अपडेट कर दो
          updateUI(userData);
          
          // ⚡ रीयल-टाइम लिसनर चालू करें (मोबाइल और प्लेयर आईडी दोनों पर लॉक)
          listenToLiveUpdates(userData.mobile, userData.player_id);
          
          // लोकलस्टोरेज को नए डेटा से अपडेट कर दो ताकि अगली बार तुरंत दिखे
          localStorage.setItem('my77play_id', userData.player_id || '');
          localStorage.setItem('my77play_name', userData.name || '');
        } else {
          handleLogout();
        }
      } catch (err) {
        console.log("Supabase se data lene me dikkat aayi:", err);
      }
    }
  };

  // इंटरफ़ेस (UI) को अपडेट करने का मुख्य फंक्शन
  function updateUI(userRow) {
    // 1. तुरंत ब्लॉक / लॉक चेक
    if (userRow.is_blocked === true) {
      document.getElementById('block-screen').style.display = 'flex';
      localStorage.clear();
      return;
    } else {
      document.getElementById('block-screen').style.display = 'none';
    }

    // 2. प्लेयर आईडी और नाम रेंडर करना
    const pId = userRow.player_id || "------";
    document.getElementById('header-player-id').innerText = "ID: " + pId;
    document.getElementById('prof-id').innerText = pId;
    
    const uName = userRow.name || "Player";
    document.getElementById('prof-name').innerText = uName;
    document.getElementById('prof-avatar-letter').innerText = uName.charAt(0).toUpperCase();
    document.getElementById('prof-mobile').innerText = userRow.mobile || "------";

    // 3. लाइव वॉलेट बैलेंस अपडेट
    const formattedBalance = parseFloat(userRow.balance || 0).toFixed(2);
    document.getElementById('main-balance').innerText = formattedBalance;
    document.getElementById('prof-balance').innerText = "₹" + formattedBalance;

    // 4. लाइव गेम्स लॉक / अनलॉक सिस्टम
    handleGameLock('game-mine', userRow.lock_mine);
    handleGameLock('game-wingo', userRow.lock_wingo);
    handleGameLock('game-slot', userRow.lock_slot);
    handleGameLock('game-head-tail', userRow.lock_head_tail);
  }

  // गेम्स लॉक करने का हैंडलर
  function handleGameLock(elementId, isLocked) {
    const el = document.getElementById(elementId);
    if (!el) return;
    if (isLocked === true) {
      el.classList.add('locked');
      el.onclick = function(e) { e.preventDefault(); alert("Yeh game admin dwara lock kiya gaya hai!"); };
    } else {
      el.classList.remove('locked');
      el.onclick = null;
    }
  }

  // ⚡ मोबाइल नंबर और प्लेयर आईडी दोनों पर आधारित असली रीयल-टाइम लिसनर लॉजिक
  function listenToLiveUpdates(mobileNum, playerId) {
    if (!supabaseClient) initSupabase();

    supabaseClient
      .channel('public:users')
      .on('postgres_changes', { 
          event: 'UPDATE', 
          schema: 'public', 
          table: 'users',
          filter: `mobile=eq.${mobileNum}` 
      }, (payload) => {
          console.log('Live update captured via mobile:', payload.new);
          updateUI(payload.new);
      })
      .on('postgres_changes', { 
          event: 'UPDATE', 
          schema: 'public', 
          table: 'users',
          filter: `player_id=eq.${playerId}` 
      }, (payload) => {
          console.log('Live update captured via player_id:', payload.new);
          updateUI(payload.new);
      })
      .subscribe();
  }

  // टैब स्विचिंग (Home <-> Profile)
  function switchTab(tabName) {
    document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));

    if (tabName === 'home') {
      document.getElementById('home-section').classList.add('active');
      document.getElementById('nav-home-btn').classList.add('active');
    } else if (tabName === 'profile') {
      document.getElementById('profile-section').classList.add('active');
      document.getElementById('nav-profile-btn').classList.add('active');
    }
  }

  // लॉग आउट (Log Out) करने का पूरा लॉजिक
  function handleLogout() {
    localStorage.removeItem('my77play_user');
    localStorage.removeItem('my77play_id');
    localStorage.removeItem('my77play_name');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
