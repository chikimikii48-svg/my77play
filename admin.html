<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my77play - Secure Admin Gateway</title>
  
  <!-- ⚡ सुपाबेस की लाइव लाइब्रेरी यहाँ जोड़ दी है -->
  <script src="https://jsdelivr.net"></script>
  
  <style>
    :root {
      --bg-color: #030308;
      --card-bg: #0b0b16;
      --primary-color: #ff0055; 
      --primary-glow: rgba(255, 0, 85, 0.5);
      --success-color: #00ffcc;
      --success-glow: rgba(0, 255, 204, 0.4);
      --text-color: #ffffff;
      --text-muted: #8e8e93;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 🖥️ PC Full Screen VIP Login Box */
    #admin-login-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #15051a 0%, #000000 100%);
      padding: 20px;
      transition: all 0.5s ease;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 0, 85, 0.25);
      padding: 50px;
      border-radius: 24px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 30px rgba(255, 0, 85, 0.05);
      text-align: center;
    }

    .main-title {
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 35px;
      text-shadow: 0 0 20px var(--primary-glow);
    }
    .main-title span { color: var(--primary-color); }

    .form-group { margin-bottom: 24px; text-align: left; }
    label {
      display: block; font-size: 0.85rem; color: var(--text-muted);
      margin-bottom: 10px; text-transform: uppercase; font-weight: bold;
      letter-spacing: 1px;
    }

    input {
      width: 100%; padding: 16px; background: #05050a;
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px;
      color: #fff; font-size: 1.1rem; font-weight: bold; outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px var(--primary-glow); }

    .admin-btn {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 1.1rem; font-weight: bold; text-transform: uppercase;
      cursor: pointer; transition: 0.2s; text-align: center;
      background: var(--primary-color); color: #fff; box-shadow: 0 4px 20px var(--primary-glow);
      letter-spacing: 1.5px; margin-top: 10px;
    }
    .admin-btn:active { transform: scale(0.98); }
    .admin-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }

    #login-status-msg {
      text-align: center; font-size: 1rem; font-weight: bold; margin-bottom: 25px;
      display: none; padding: 16px; border-radius: 10px; width: 100%; max-width: 500px;
    }
    .status-success { background: rgba(0, 255, 204, 0.1); color: var(--success-color); border: 1px solid var(--success-color); text-shadow: 0 0 10px var(--success-glow); }
    .status-error { background: rgba(255, 0, 85, 0.1); color: var(--primary-color); border: 1px solid var(--primary-color); }

    /* 🖥️ ३ सेकंड वाला बड़ा वेलकम स्क्रीन */
    #welcome-screen {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: #000;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .big-welcome-text {
      font-size: 4.5rem;
      font-weight: 900;
      color: var(--success-color);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 40px var(--success-glow);
      line-height: 1.2;
    }
    .big-welcome-text span { color: #fff; font-size: 2.5rem; display: block; margin-top: 15px; letter-spacing: 1px; font-weight: 500;}

    /* 💻 बाद में चालू होने वाली होम स्क्रीन (अभी के लिए डमी) */
    #admin-main-panel {
      display: none;
      width: 100vw;
      height: 100vh;
      padding: 40px;
      background: #05050a;
      overflow-y: auto;
    }
    .dashboard-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dashboard-header h1 { color: var(--primary-color); font-size: 2.5rem; text-transform: uppercase; text-shadow: 0 0 15px var(--primary-glow); }
    .logout-btn { background: #222; color: #fff; width: auto; padding: 10px 25px; border-radius: 8px; border: 1px solid #333; font-weight: bold; cursor: pointer; }
    .logout-btn:hover { background: var(--primary-color); border-color: var(--primary-color); box-shadow: 0 0 15px var(--primary-glow); }
    .dummy-content { margin-top: 50px; text-align: center; color: var(--text-muted); font-size: 1.5rem; border: 2px dashed #222; padding: 100px; border-radius: 20px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- ================= 🔒 १. फुल स्क्रीन लॉगिन गेटवे ================= -->
  <div id="admin-login-box">
    <div id="login-status-msg"></div>

    <div class="login-card">
      <div class="main-title">my77play<br><span>Admin Gateway</span></div>
      
      <div class="form-group">
        <label>Admin Mobile Number</label>
        <input type="text" id="admin-id-input" placeholder="Enter Registered Mobile" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Secret Password</label>
        <input type="password" id="admin-pass-input" placeholder="Enter Password">
      </div>
      <button class="admin-btn" id="login-btn" onclick="handleAdminLogin()">Secure Access</button>
    </div>
  </div>

  <!-- ================= ✨ २. ३ सेकंड का बड़ा वेलकम स्क्रीन ================= -->
  <div id="welcome-screen">
    <div class="big-welcome-text">
      Welcome to my77play<br><span>Admin Panel Activated Successfully...</span>
    </div>
  </div>

  <!-- ================= 💻 ३. एडमिन पैनल की होम स्क्रीन (बाद में फीचर्स जोड़ेंगे) ================= -->
  <div id="admin-main-panel">
    <div class="dashboard-header">
      <h1>my77play VIP Control Dashboard</h1>
      <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
    </div>
    
    <div class="dummy-content">
      ⚙️ एडमिन होम स्क्रीन सर्वर से सफलतापूर्वक कनेक्ट हो गई है।<br>
      <span style="font-size: 1.1rem; color: #555; display:block; margin-top: 10px;">आगे का पूरा कंट्रोल सिस्टम (यूजर सर्च, वॉलेट और गेम ब्लॉक) हम अगले स्टेप में यहाँ लाइव चालू करेंगे।</span>
    </div>
  </div>

  <script>
    // ⚡ आपकी index.html से निकाली गई असली क्रेडेंशियल्स यहाँ ऑटो-फिट कर दी हैं
    const SUPABASE_URL = 'https://supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1d2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE';

    // सुपाबेस इनिशियलाइज़ करना
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAdminLogin() {
      const inputId = document.getElementById('admin-id-input').value.trim();
      const inputPass = document.getElementById('admin-pass-input').value;
      const statusMsg = document.getElementById('login-status-msg');
      const loginBtn = document.getElementById('login-btn');

      if(!inputId || !inputPass) {
        showStatus(statusMsg, "कृपया मोबाइल नंबर और पासवर्ड दोनों भरें!", "error");
        return;
      }

      loginBtn.disabled = true;
      showStatus(statusMsg, "सुरक्षा क्रेडेंशियल्स की जांच जारी है...", "success");

      try {
        // आपकी सुपाबेस की 'users' टेबल से मोबाइल नंबर और पासवर्ड मैच करना
        const { data: adminUser, error } = await supabase
          .from('users')
          .select('*')
          .eq('mobile', inputId)
          .eq('password', inputPass)
          .eq('is_admin', true) // डेटाबेस में इस कॉलम का true होना जरूरी है
          .maybeSingle();

        if (error) {
          showStatus(statusMsg, "सर्वर एरर! कृपया दोबारा प्रयास करें।", "error");
          loginBtn.disabled = false;
          return;
        }

        // अगर क्रेडेंशियल्स सही हैं और यूजर एडमिन है
        if (adminUser) {
          document.getElementById('admin-login-box').style.display = 'none';
          document.getElementById('welcome-screen').style.display = 'flex';
          
          // 3 सेकंड का डिले देकर होम स्क्रीन खोलना
          setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('admin-main-panel').style.display = 'block';
          }, 3000);

        } else {
          showStatus(statusMsg, "पहुंच अस्वीकृत! गलत पासवर्ड या आप एडमिन नहीं हैं।", "error");
          loginBtn.disabled = false;
        }

      } catch (e) {
        showStatus(statusMsg, "कनेक्शन फेल! कृपया रिफ्रेश करें।", "error");
        loginBtn.disabled = false;
      }
    }

    function showStatus(el, text, type) {
      el.innerText = text;
      el.style.display = "block";
      el.className = type === 'success' ? 'status-success' : 'status-error';
    }
  </script>
</body>
</html>
