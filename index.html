<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Login</title>
    <!-- Supabase Official JS CDN via unpkg -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #0f0f1a; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .container { background: #1c1c27; padding: 30px; border-radius: 16px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); text-align: center; border: 1px solid #00ffcc; }
        h1 { font-size: 2.6rem; color: #00ffcc; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        h2 { margin-bottom: 25px; color: #aaa; font-size: 1rem; font-weight: normal; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input { background: #2c2c3e; border: 1px solid #444; padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 8px rgba(0,255,204,0.2); }
        button { background: #00ffcc; color: #0f0f1a; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #00ccaa; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        button:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .toggle-link { margin-top: 20px; display: block; color: #aaa; cursor: pointer; font-size: 0.9rem; }
        .toggle-link span { color: #00ffcc; text-decoration: underline; font-weight: bold; }
        .help-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid #2c2c3e; font-size: 0.85rem; color: #777; display: none; }
        .help-section a { color: #25D366; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; }
        .help-section a:hover { text-decoration: underline; }
        .error-msg { color: #ff4d4d; margin-bottom: 15px; font-size: 0.9rem; display: none; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 77, 77, 0.2); text-align: left; }
        .success-msg { color: #25D366; margin-bottom: 15px; font-size: 0.9rem; display: none; background: rgba(37, 211, 102, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(37, 211, 102, 0.2); text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <h1>my77play</h1>
        <h2 id="form-title">Login to Play</h2>

        <div id="error-box" class="error-msg"></div>
        <div id="success-box" class="success-msg"></div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <input type="tel" id="mobile" placeholder="Enter Mobile Number" required pattern="[0-9]{10}">
            <input type="password" id="password" placeholder="Enter Password" required minlength="6">
            <button type="submit" id="submit-btn">Login</button>
        </form>

        <div class="toggle-link" id="toggle-auth" onclick="toggleMode()">
            Don't have an account? <span>Register New Account</span>
        </div>

        <div class="help-section" id="help-box">
            Forgot Password or Need Help? <br>
            <a href="#" target="_blank" id="whatsapp-link">💬 Contact Admin on WhatsApp</a>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        let isLoginMode = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleAuth = document.getElementById('toggle-auth');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        const helpBox = document.getElementById('help-box');
        const whatsappLink = document.getElementById('whatsapp-link');

        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1d2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 

        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 2. HELP LINK SYSTEM (DYNAMIC ADMIN PANEL OVERRIDE) ---
        async function loadHelpNumber() {
            try {
                // यह एडमिन पैनल से आपका असली नंबर ढूंढेगा
                const { data, error } = await supabaseClient.from('admin_settings').select('value').eq('key', 'whatsapp').single();
                if (data && data.value) {
                    whatsappLink.href = 'https://wa.me' + data.value;
                } else {
                    // अगर एडमिन पैनल में नंबर सेट नहीं है, तो यह नकली बैकअप नंबर काम करेगा
                    whatsappLink.href = 'https://wa.me919999999999';
                }
                helpBox.style.display = 'block';
            } catch (err) {
                whatsappLink.href = 'https://wa.me919999999999';
                helpBox.style.display = 'block';
            }
        }
        loadHelpNumber();

        // --- 3. TOGGLE FORMS ---
        function toggleMode() {
            isLoginMode = !isLoginMode;
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            if (isLoginMode) {
                formTitle.innerText = "Login to Play";
                submitBtn.innerText = "Login";
                toggleAuth.innerHTML = "Don't have an account? <span>Register New Account</span>";
            } else {
                formTitle.innerText = "Register Account";
                submitBtn.innerText = "Register";
                toggleAuth.innerHTML = "Already have an account? <span>Login Here</span>";
            }
        }

        // --- 4. FAST AUTH LOGIC (BYPASS CLOGGED EMAIL ROUTER) ---
        async function handleAuth(e) {
            e.preventDefault();
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;

            if (isLoginMode) {
                submitBtn.innerText = "Logging in...";
                
                // डायरेक्ट प्लेयर्स प्रोफाइल से चेक करना ताकि ईमेल स्पीड बाधक न बने
                const { data, error } = await supabaseClient
                    .from('players_profile')
                    .select('*')
                    .eq('mobile', mobile)
                    .single();

                if (error || !data) {
                    showError("Invalid Mobile Number or Account Not Found!");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Login";
                } else {
                    showSuccess("Login Successful! Opening Game...");
                    setTimeout(() => {
                        window.location.href = '/home.html'; 
                    }, 1000);
                }
            } else {
                submitBtn.innerText = "Registering...";
                
                // पहले चेक करो कि नंबर पहले से रजिस्टर्ड तो नहीं है
                const { data: existingUser } = await supabaseClient
                    .from('players_profile')
                    .select('mobile')
                    .eq('mobile', mobile)
                    .single();

                if (existingUser) {
                    showError("Mobile number already registered!");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Register";
                    return;
                }

                // सुपर्बेस एनोनिमस इंस्टेंट सेशन
                const { data: authData, error: authError } = await supabaseClient.auth.signInAnonymously();

                if (authError) {
                    showError(authError.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Register";
                } else {
                    // डायरेक्ट प्लेयर्स प्रोफाइल टेबल में एंट्री (बिना ईमेल लोडिंग के 1 सेकंड में)
                    const { error: dbError } = await supabaseClient
                        .from('players_profile')
                        .insert([{ id: authData.user.id, mobile: mobile, wallet_balance: 0.00 }]);

                    if (dbError) {
                        showError("Database Error! Please try again.");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Register";
                    } else {
                        showSuccess("Registration Successful! Please Login Now.");
                        toggleMode();
                        submitBtn.disabled = false;
                    }
                }
            }
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }

        function showSuccess(msg) {
            successBox.innerText = msg;
            successBox.style.display = 'block';
        }
    </script>
</body>
</html>
