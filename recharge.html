<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.supabase.co https://jsdelivr.net https://supabase.co; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my77play - Deposit / Recharge</title>
    <!-- सुप्रबसे का बिल्कुल पक्का और पूरा CDN लिंक जो Vercel पर कभी फेल नहीं होगा -->
    <script src="https://jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0b13; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .recharge-container { width: 100%; max-width: 420px; background: #161626; padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 255, 204, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #00ffcc; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        .header h1 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .form-group label { font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { background: #1f1f3a; border: 1px solid #333; padding: 14px; border-radius: 12px; color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s; width: 100%; }
        .form-group select:focus, .form-group input:focus { border-color: #00ffcc; }
        
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .amt-btn { background: #1f1f3a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .amt-btn:hover, .amt-btn.active { background: #00ffcc; color: #0b0b13; border-color: #00ffcc; }
        
        .upi-box { background: rgba(0, 0, 0, 0.2); border: 1px dashed rgba(0, 255, 204, 0.3); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .upi-title { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .upi-id { font-size: 1.1rem; color: #00ffcc; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 10px; word-break: break-all; }
        .qr-image-container { margin: 10px auto; max-width: 160px; background: #fff; padding: 5px; border-radius: 8px; display: none; }
        .qr-image-container img { width: 100%; height: auto; display: block; }
        .copy-btn { background: #00ffcc; color: #0b0b13; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; }
        
        .submit-btn { background: #00ffcc; color: #0b0b13; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .submit-btn:hover { background: #00ccaa; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .submit-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        
        .msg-box { padding: 12px; border-radius: 8px; font-size: 0.95rem; display: none; margin-bottom: 15px; text-align: left; }
        .msg-error { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); }
        .msg-success { color: #25D366; background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); }

        .history-section { margin-top: 30px; border-top: 1px solid #2c2c3e; padding-top: 20px; width: 100%; }
        .history-title { font-size: 1.1rem; color: #00ffcc; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
        .history-card { background: #1f1f3a; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #333; font-size: 0.95rem; text-align: left; }
        .history-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .history-reason { margin-top: 6px; padding-top: 6px; border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.85rem; color: #ff9999; }
        .status-Pending { color: #ffaa00; font-weight: bold; }
        .status-Approved { color: #25D366; font-weight: bold; }
        .status-Rejected { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
    <div class="recharge-container">
        <div class="header"><button class="back-btn" onclick="goBack()">←</button><h1>Deposit / Recharge</h1></div>
        
        <div id="status-msg" class="msg-box"></div>
        
        <div class="form-group">
            <label>Enter Deposit Amount (₹)</label>
            <input type="number" id="recharge-amount" placeholder="Minimum ₹100" min="100" value="100">
        </div>
        
        <div class="amount-grid">
            <button class="amt-btn active" onclick="setAmount(100, this)">100</button>
            <button class="amt-btn" onclick="setAmount(300, this)">300</button>
            <button class="amt-btn" onclick="setAmount(500, this)">500</button>
            <button class="amt-btn" onclick="setAmount(1000, this)">1000</button>
        </div>

        <div class="form-group">
            <label>Select UPI Option</label>
            <select id="upi-select" onchange="onUPIChange()">
                <option value="">Loading Payment Methods...</option>
            </select>
        </div>
        
        <div class="upi-box">
            <div class="upi-title">Pay on this Admin UPI ID</div>
            <div class="upi-id" id="admin-upi">admin77play@ybl</div>
            
            <div class="qr-image-container" id="qr-container">
                <img id="admin-qr-img" src="" alt="Scan QR Code">
            </div>
            
            <button class="copy-btn" onclick="copyUPI()">Copy UPI ID</button>
        </div>
        
        <div class="form-group">
            <label>Enter 12-Digit UTR / Transaction ID</label>
            <input type="text" id="utr-number" placeholder="Enter UTR after payment" maxlength="12">
        </div>
        
        <button class="submit-btn" id="sub-btn" onclick="submitRecharge()">Submit Request</button>

        <div class="history-section">
            <div class="history-title">📜 Recharge History</div>
            <div id="history-container">Loading your history...</div>
        </div>
    </div>
    <script>
    const activeUser = localStorage.getItem('my77play_user');
    if (!activeUser) { window.location.href = 'index.html'; }
    
    // आपकी index.html वाली बिल्कुल असली और री-चेक की हुई क्रेडेंशियल्स
    const supabaseUrl = 'https://supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmZWp2Zmx1d2V6bWJyZnZ4bXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjEsImV4cCI6MjA5NzczNDA2MX0.Gc8XqzrWKXmBtCDfPy9zB7R0sNdD9huccHzJyIMvMZE'; 
    
    let supabaseClient = null;
    let upiListGlobal = [];

    // सुप्रबसे को चालू करने का मजबूत फंक्शन
    function initSupabase() {
        // विंडो लाइब्रेरी चेक करने का नया तरीका जो Vercel पर कभी फेल नहीं होगा
        const supabaseLib = window.supabase;
        if (supabaseLib && supabaseLib.createClient) {
            supabaseClient = supabaseLib.createClient(supabaseUrl, supabaseKey);
        } else {
            console.log("Supabase Library loading issues, retrying...");
        }
    }

    window.onload = function() {
        initSupabase();
        loadAllAdminUPIs();
        loadUserRechargeHistory();
    };

    // 1. सुप्रबेस से आपकी 'admin_upi' टेबल का लाइव डेटा खींचना
    async function loadAllAdminUPIs() {
        try {
            if(!supabaseClient) initSupabase();
            if(!supabaseClient) {
                document.getElementById('upi-select').innerHTML = '<option value="">Connection error, please refresh</option>';
                return;
            }

            const { data, error } = await supabaseClient.from('admin_upi').select('*');
            const selectDropdown = document.getElementById('upi-select');
            
            if (data && data.length > 0) {
                upiListGlobal = data;
                selectDropdown.innerHTML = '';
                
                data.forEach((item, index) => {
                    let option = document.createElement('option');
                    option.value = index;
                    option.innerText = "UPI Option " + (index + 1);
                    selectDropdown.appendChild(option);
                });
                
                showSelectedUPIAndQR(0);
            } else {
                selectDropdown.innerHTML = '<option value="">No UPI Configured</option>';
            }
        } catch (e) { 
            document.getElementById('upi-select').innerHTML = '<option value="">Error Loading UPI</option>';
        }
    }

    function onUPIChange() {
        const selectedIndex = document.getElementById('upi-select').value;
        if(selectedIndex !== "") {
            showSelectedUPIAndQR(selectedIndex);
        }
    }

    function showSelectedUPIAndQR(index) {
        const upiData = upiListGlobal[index];
        if(upiData) {
            document.getElementById('admin-upi').innerText = upiData.upi_id;
            const qrContainer = document.getElementById('qr-container');
            const qrImg = document.getElementById('admin-qr-img');
            
            if(upiData.qr_url && upiData.qr_url.trim() !== "" && upiData.qr_url !== "no_qr" && upiData.qr_url !== "NULL") {
                qrImg.src = upiData.qr_url;
                qrContainer.style.display = 'block';
            } else {
                qrContainer.style.display = 'none';
                qrImg.src = "";
            }
        }
    }

    // 2. यूजर की लाइव रिचार्ज हिस्ट्री देखना (Approve/Reject लाइव दिखेगा)
    async function loadUserRechargeHistory() {
        try {
            if(!supabaseClient) initSupabase();
            if(!supabaseClient) return;

            const { data, error } = await supabaseClient
                .from('recharges')
                .select('*')
                .eq('mobile', activeUser)
                .order('id', { ascending: false });

            const historyContainer = document.getElementById('history-container');
            if (data && data.length > 0) {
                historyContainer.innerHTML = '';
                data.forEach(row => {
                    let reasonHTML = '';
                    if(row.status === 'Rejected' && row.reason && row.reason.trim() !== '') {
                        reasonHTML = `<div class="history-reason">❌ Reason: ${row.reason}</div>`;
                    }
                    
                    const card = `
                        <div class="history-card">
                            <div class="history-row"><strong>Amount:</strong> <span>₹${row.amount}</span></div>
                            <div class="history-row"><strong>UTR:</strong> <span>${row.utr}</span></div>
                            <div class="history-row"><strong>Status:</strong> <span class="status-${row.status}">${row.status}</span></div>
                            ${reasonHTML}
                        </div>`;
                    historyContainer.innerHTML += card;
                });
            } else {
                historyContainer.innerHTML = '<div style="color:#aaa;font-size:0.9rem;">No recharge requests found.</div>';
            }
        } catch (e) {
            document.getElementById('history-container').innerText = "Failed to load history.";
        }
    }

    function showMsg(text, isSuccess) { 
        const statusMsg = document.getElementById('status-msg');
        statusMsg.innerText = text; 
        statusMsg.style.display = 'block'; 
        statusMsg.className = "msg-box " + (isSuccess ? "msg-success" : "msg-error"); 
    }
    
    function setAmount(val, btn) { 
        document.getElementById('recharge-amount').value = val; 
        document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
    }
    
    function copyUPI() { 
        const upiText = document.getElementById('admin-upi').innerText;
        navigator.clipboard.writeText(upiText); 
        alert("UPI ID Copied!"); 
    }
    
    function goBack() { window.location.href = 'home.html'; }

    // 3. पेमेंट रिक्वेस्ट सबमिट करना (जो आपके एडमिन पैनल पर पेंडिंग दिखेगी)
    async function submitRecharge() {
        const statusMsg = document.getElementById('status-msg');
        const subBtn = document.getElementById('sub-btn');
        statusMsg.style.display = 'none';
        
        const amount = parseFloat(document.getElementById('recharge-amount').value);
        const utr = document.getElementById('utr-number').value.trim();

        if (isNaN(amount) || amount < 100) { showMsg("Minimum recharge amount is ₹100!", false); return; }
        if (utr.length !== 12 || isNaN(utr)) { showMsg("Please enter valid 12-digit UTR!", false); return; }
        
        subBtn.disabled = true; 
        subBtn.innerText = "Submitting...";
        
        try {
            if(!supabaseClient) initSupabase();
            const { error } = await supabaseClient
                .from('recharges')
                .insert([{ mobile: activeUser, amount: amount, utr: utr, status: 'Pending' }]);
                
            if (error) {
                showMsg("Submission failed: " + error.message, false);
                subBtn.disabled = false; 
                subBtn.innerText = "Submit Request";
            } else {
                showMsg("Recharge Request Submitted Successfully!", true);
                document.getElementById('utr-number').value = "";
                loadUserRechargeHistory(); // लिस्ट तुरंत रिफ्रेश होगी
                subBtn.disabled = false;
                subBtn.innerText = "Submit Request";
            }
        } catch(err) { 
            subBtn.disabled = false; 
            subBtn.innerText = "Submit Request"; 
        }
    }
</script>
</body>
</html>
